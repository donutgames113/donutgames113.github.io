<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curato | Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body data-theme="dark">
<nav class="fixed top-0 w-full z-50 nav-blur">
    <div class="max-w-7xl mx-auto px-6 min-h-16 py-3 flex flex-col gap-3 lg:h-16 lg:py-0 lg:flex-row lg:justify-between lg:items-center">
        <div class="leading-tight">
            <div class="text-lg font-semibold tracking-tighter uppercase">Curato</div>
            <div class="text-[9px] nav-kicker uppercase">Personal Archive</div>
        </div>
        <div class="flex items-center gap-4 nav-actions flex-wrap lg:flex-nowrap lg:justify-end">
            <div class="theme-switcher" aria-label="Theme picker">
                <button class="theme-chip active" data-theme="dark" type="button">Noir</button>
                <button class="theme-chip" data-theme="light" type="button">Porcelain</button>
                <button class="theme-chip" data-theme="dune" type="button">Dune</button>
                <button class="theme-chip" data-theme="slate" type="button">Slate</button>
            </div>
            <select id="model-select" class="hidden md:block nav-field text-[9px] uppercase tracking-widest pb-1 focus:outline-none cursor-pointer">
                <option value="gemini-3.1-flash-lite-preview">3.1 Flash Lite</option>
                <option value="gemini-3.1-pro-preview">3.1 Pro</option>
                <option value="gemini-3-flash-preview">3 Flash Preview</option>
            </select>
            <input id="user-api-key" type="password" placeholder="Gemini Key" class="hidden md:block nav-field text-[10px] w-32 pb-1 focus:outline-none" />
            <button id="auth-btn" class="nav-action text-[10px] tracking-[0.2em] uppercase">Connect</button>
        </div>
    </div>
</nav>
<main class="max-w-7xl mx-auto px-6 pt-40 lg:pt-32 pb-24">
    <section class="max-w-4xl mx-auto text-center mb-32">
        <div class="text-[10px] tracking-[0.4em] uppercase eyebrow mb-8">AI Style Consultant</div>
        <input id="occasion-input" class="w-full bg-transparent occasion-field py-8 text-center" placeholder="Where are we going?" />
        <div class="flex flex-wrap justify-center gap-2 mt-8">
            <button onclick="document.getElementById('occasion-input').value = this.innerText" class="chip">Tokyo solo trip</button>
            <button onclick="document.getElementById('occasion-input').value = this.innerText" class="chip">Meeting the family, 30C</button>
            <button onclick="document.getElementById('occasion-input').value = this.innerText" class="chip">Late night in Soho</button>
        </div>
        <button id="ask-btn" class="mt-12 px-12 py-4 rounded-full primary-btn text-[10px] tracking-[0.3em] uppercase active:scale-95">
            Consult Archive
        </button>
        <div id="ai-suggestion" class="hidden mt-12 glass p-10 rounded-3xl max-w-2xl mx-auto ai-render-area"></div>
    </section>
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-16">
        <div class="lg:col-span-4 lg:sticky lg:top-28 h-fit">
            <div class="glass p-8 rounded-[2rem]">
                <div class="text-[10px] tracking-[0.3em] uppercase eyebrow mb-8">New Addition</div>
                <div id="drop-zone" class="upload-zone group">
                    <div class="text-center group-hover:scale-110 transition-transform duration-500">
                        <div class="text-2xl font-light upload-zone-mark">+</div>
                        <div id="drop-text" class="text-[9px] tracking-[0.3em] uppercase mt-2 upload-zone-copy">Upload Image</div>
                    </div>
                    <img id="preview-img" class="absolute inset-0 w-full h-full object-cover hidden" />
                    <input id="file-input" type="file" class="hidden" accept="image/*" />
                </div>
                <div id="category-wrap" class="mt-8">
                    <div class="flex flex-wrap gap-2 justify-center md:justify-start p-2 rounded-2xl surface-group">
                        <button class="chip sort-opt active" data-sort="ALL">All</button>
                        <button class="chip sort-opt" data-sort="TOPS">Tops</button>
                        <button class="chip sort-opt" data-sort="BOTTOMS">Bottoms</button>
                        <button class="chip sort-opt" data-sort="Watch">Watches</button>
                        <button class="chip sort-opt" data-sort="Fragrance">Scent</button>
                    </div>
                    <div class="mt-4 flex flex-wrap gap-2">
                        <button class="chip cat-opt" data-val="Watch">Watch</button>
                        <button class="chip cat-opt" data-val="Fragrance">Scent</button>
                        <button class="chip cat-opt" data-val="Other" data-sub="Top">Top</button>
                        <button class="chip cat-opt" data-val="Other" data-sub="Bottom">Bottom</button>
                    </div>
                </div>
                <div class="space-y-4 mt-8">
                    <input id="item-name" placeholder="Item Name" class="w-full text-field py-3 text-sm" />
                    <input id="item-brand" placeholder="Brand / Designer" class="w-full text-field py-3 text-sm" />
                </div>
                <button id="save-btn" class="w-full mt-10 primary-btn text-[10px] tracking-[0.3em] uppercase py-5 rounded-2xl font-medium">
                    Archive Item
                </button>
            </div>
        </div>
        <div class="lg:col-span-8">
            <div class="flex justify-between items-end mb-12">
                <div class="text-[10px] tracking-[0.3em] uppercase eyebrow">The Collection</div>
                <div id="item-count" class="text-[10px] tracking-[0.1em] count-copy tabular-nums">00 ITEMS</div>
            </div>
            <div id="catalog-grid" class="grid grid-cols-2 md:grid-cols-3 gap-x-8 gap-y-12"></div>
        </div>
    </div>
</main>
<script type="module" src="app.js"></script>
</body>
</html>
