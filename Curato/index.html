<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curato | Archive</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0b0b0c;
            --card: rgba(255,255,255,0.06);
            --stroke: rgba(255,255,255,0.08);
            --text: rgba(255,255,255,0.9);
            --muted: rgba(255,255,255,0.5);
            --accent: #d4ff6a;
        }

        body {
            font-family: Inter, sans-serif;
            background: radial-gradient(1200px 800px at 20% 0%, #1a1a1f 0%, #0b0b0c 60%);
            color: var(--text);
            letter-spacing: -0.02em;
            overflow-x: hidden;
        }

        /* subtle noise overlay */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.05;
            pointer-events: none;
        }

        .glass {
            background: var(--card);
            border: 1px solid var(--stroke);
            backdrop-filter: blur(18px);
            box-shadow: 0 20px 80px rgba(0,0,0,0.4);
        }

        .nav-blur {
            background: rgba(10,10,12,0.6);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--stroke);
        }

        .item-card {
            transition: all .35s cubic-bezier(.2,.8,.2,1);
        }

        .item-card:hover {
            transform: translateY(-8px) scale(1.01);
        }

        .item-card img {
            filter: saturate(0.8) contrast(1.1);
            transition: .5s ease;
        }

        .item-card:hover img {
            filter: saturate(1.2) contrast(1.2);
            transform: scale(1.05);
        }

        .chip {
            border: 1px solid var(--stroke);
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 10px;
            color: var(--muted);
            transition: .25s;
            cursor: pointer;
        }

        .chip:hover {
            border-color: var(--accent);
            color: white;
        }

        .cat-opt.active {
            background: white;
            color: black;
        }

        input, button {
            outline: none;
        }

        input::placeholder {
            color: rgba(255,255,255,0.3);
        }

        #occasion-input {
            font-size: 28px;
            font-weight: 300;
        }

        .glow {
            text-shadow: 0 0 30px rgba(212,255,106,0.15);
        }
    </style>
</head>

<body>

<!-- NAV -->
<nav class="fixed top-0 w-full z-50 nav-blur">
    <div class="max-w-7xl mx-auto px-6 h-16 flex justify-between items-center">

        <div class="leading-tight">
            <div class="text-lg font-semibold tracking-tight">Curato</div>
            <div class="text-[10px] tracking-[0.3em] text-white/40 uppercase">Archive System</div>
        </div>

        <div class="flex items-center gap-6">
            <input id="user-api-key" type="password" placeholder="Gemini Key" class="hidden md:block bg-transparent border-b border-white/10 text-xs w-40" />
            <button class="text-xs tracking-[0.25em] uppercase text-white/60 hover:text-white">Connect</button>
        </div>

    </div>
</nav>

<!-- MAIN -->
<main class="max-w-7xl mx-auto px-6 pt-32 pb-24">

    <!-- HERO -->
    <section class="max-w-3xl mx-auto text-center mb-24">

        <div class="text-[10px] tracking-[0.35em] uppercase text-white/40 mb-6">AI Style Consultant</div>

        <input id="occasion-input" class="w-full bg-transparent border-b border-white/10 py-6 text-center focus:border-white transition glow" placeholder="Bar in Shoreditch. You might see someone you know..." />

        <div class="flex flex-wrap justify-center gap-2 mt-6">
            <div class="chip">Wedding in Tuscany, 34°C, meeting her family</div>
            <div class="chip">Finance internship Canary Wharf</div>
            <div class="chip">Rooftop date London, low light</div>
            <div class="chip">Tokyo solo trip, no plans</div>
        </div>

        <button id="ask-btn" class="mt-10 px-10 py-3 rounded-full bg-white text-black text-[10px] tracking-[0.3em] uppercase hover:scale-[1.02] transition">
            Consult Archive
        </button>

        <div id="ai-suggestion" class="hidden mt-12 glass p-8 rounded-2xl text-sm text-white/70 italic"></div>

    </section>

    <!-- GRID -->
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-14">

        <!-- LEFT -->
        <div class="lg:col-span-4 lg:sticky lg:top-28">

            <div class="glass p-8 rounded-3xl">

                <div class="text-[10px] tracking-[0.3em] uppercase text-white/40 mb-6">New Addition</div>

                <div id="drop-zone" class="aspect-square border border-white/10 rounded-2xl flex items-center justify-center cursor-pointer relative overflow-hidden hover:border-white/30 transition">
                    <div class="text-center text-white/30">
                        <div class="text-3xl">+</div>
                        <div class="text-[10px] tracking-[0.3em] uppercase mt-2">Upload</div>
                    </div>
                    <img id="preview-img" class="absolute inset-0 w-full h-full object-cover hidden" />
                    <input id="file-input" type="file" class="hidden" />
                </div>

                <div class="flex flex-wrap gap-2 mt-6">
                    <button class="cat-opt chip" data-val="Watch">Watches</button>
                    <button class="cat-opt chip" data-val="Fragrance">Fragrance</button>
                    <button class="cat-opt chip" data-val="Apparel">Apparel</button>
                    <button class="cat-opt chip" data-val="Other">Misc</button>
                </div>

                <input id="item-name" placeholder="Item Name" class="w-full bg-transparent border-b border-white/10 py-3 mt-6 text-sm" />
                <input id="item-brand" placeholder="Brand" class="w-full bg-transparent border-b border-white/10 py-3 mt-4 text-sm" />

                <button id="save-btn" class="w-full mt-8 bg-white text-black text-[10px] tracking-[0.3em] uppercase py-4 rounded-xl hover:opacity-90">
                    Archive Item
                </button>

            </div>

        </div>

        <!-- RIGHT -->
        <div class="lg:col-span-8">

            <div class="flex justify-between items-end mb-10">
                <div class="text-[10px] tracking-[0.3em] uppercase text-white/40">The Collection</div>
                <div id="item-count" class="text-[10px] text-white/40">00 items</div>
            </div>

            <div id="catalog-grid" class="grid grid-cols-2 md:grid-cols-3 gap-8"></div>

        </div>

    </div>

</main>

<script type="module" src="app.js"></script>

</body>
</html>
