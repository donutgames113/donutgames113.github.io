<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CURATO / ARCHIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; }
        .item-card:hover .delete-btn { opacity: 1; }
        .delete-btn { opacity: 0; position: absolute; top: 5px; right: 5px; background: red; color: white; font-size: 8px; padding: 2px 5px; text-transform: uppercase; transition: 0.2s; }
    </style>
</head>
<body class="p-6 max-w-2xl mx-auto">

    <header class="flex justify-between items-end mb-12 border-b border-neutral-800 pb-4">
        <div>
            <h1 class="text-2xl font-bold tracking-tighter">CURATO</h1>
            <p class="text-[10px] text-neutral-500 uppercase tracking-[0.2em]">Personal Style Archive</p>
        </div>
        <button id="auth-btn" class="text-[10px] border border-white px-4 py-2 hover:bg-white hover:text-black transition uppercase font-bold">
            Connect Discord
        </button>
    </header>

    <!-- Key Input (Hidden until login) -->
    <div id="key-mgr" class="hidden mb-8 space-y-2">
        <p class="text-[9px] text-neutral-500 uppercase">Input Gemini API Key to enable AI features:</p>
        <div class="flex gap-2">
            <input id="user-api-key" type="password" placeholder="AIza..." class="bg-transparent border border-neutral-800 p-2 text-xs flex-1 outline-none focus:border-white">
            <button id="save-key-btn" class="bg-white text-black text-[10px] px-4 font-bold uppercase">Save Key</button>
        </div>
    </div>

    <main class="grid grid-cols-1 md:grid-cols-2 gap-12">
        <section>
            <div id="drop-zone" class="aspect-[3/4] border-2 border-dashed border-neutral-800 flex flex-col items-center justify-center cursor-pointer hover:border-neutral-500 transition mb-4 overflow-hidden relative">
                <p id="drop-text" class="text-[10px] text-neutral-500 uppercase">Drop image or click</p>
                <img id="preview-img" class="hidden absolute inset-0 w-full h-full object-cover">
                <input type="file" id="file-input" class="hidden" accept="image/*">
            </div>

            <div class="space-y-4">
                <input id="item-name" type="text" placeholder="ITEM NAME" class="w-full bg-transparent border-b border-neutral-800 p-2 text-xs outline-none focus:border-white">
                <input id="item-brand" type="text" placeholder="BRAND" class="w-full bg-transparent border-b border-neutral-800 p-2 text-xs outline-none focus:border-white">
                <div class="flex gap-2" id="cat-group">
                    <button class="cat-opt text-[9px] border border-neutral-800 px-3 py-1 uppercase" data-val="Watch">Watch</button>
                    <button class="cat-opt text-[9px] border border-neutral-800 px-3 py-1 uppercase" data-val="Fragrance">Fragrance</button>
                    <button class="cat-opt text-[9px] border border-neutral-800 px-3 py-1 uppercase" data-val="Apparel">Apparel</button>
                    <button class="cat-opt text-[9px] border border-neutral-800 px-3 py-1 uppercase bg-white text-black" data-val="Other">Other</button>
                </div>
                <button id="save-btn" class="w-full bg-white text-black py-3 text-[10px] font-bold uppercase tracking-widest">Save to Archive</button>
            </div>
        </section>

        <section>
            <div class="mb-8 p-4 border border-neutral-800">
                <p class="text-[9px] text-neutral-500 uppercase mb-2 italic">Stylist Consultation</p>
                <input id="occasion-input" type="text" placeholder="The Occasion..." class="w-full bg-transparent border-b border-neutral-800 p-2 text-xs outline-none mb-4">
                <button id="ask-btn" class="text-[9px] uppercase border border-white px-4 py-2 w-full">Ask Curato</button>
                <p id="ai-suggestion" class="hidden mt-4 text-[11px] text-neutral-300 italic"></p>
            </div>
            <div id="catalog-grid" class="grid grid-cols-2 gap-4"></div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
