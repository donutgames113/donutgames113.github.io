<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curato | Personal Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;400&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #fff; color: #1a1a1a; }
        .drop-zone.active { border-color: #000; background: #f9f9f9; }
        .item-card img { filter: grayscale(100%); transition: filter 0.4s ease; }
        .item-card:hover img { filter: grayscale(0%); }
    </style>
</head>
<body class="p-6 md:p-12">
    <header class="max-w-6xl mx-auto flex justify-between items-end mb-20">
        <div>
            <h1 class="text-4xl font-extralight tracking-tighter uppercase">Curato</h1>
            <p class="text-xs tracking-widest text-neutral-400 mt-2">AI-POWERED ARCHIVE</p>
        </div>
        <div id="auth-controls">
            <button id="auth-btn" class="text-xs border border-neutral-200 px-6 py-2 rounded-full hover:bg-black hover:text-white transition">CONNECT DISCORD</button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto">
        <!-- Occasion Finder -->
        <section class="mb-24">
            <label class="text-[10px] uppercase tracking-[0.2em] text-neutral-400 block mb-4">The Occasion</label>
            <div class="flex flex-col md:flex-row gap-4">
                <input type="text" id="occasion-input" placeholder="A gala in Paris, or a weekend at the lake..." 
                       class="flex-grow bg-transparent border-b border-neutral-200 py-3 text-lg focus:outline-none focus:border-black transition">
                <button id="ask-btn" class="text-xs font-bold tracking-widest uppercase py-3 px-8 border border-black hover:bg-black hover:text-white transition">Consult AI</button>
            </div>
            <div id="ai-suggestion" class="mt-6 text-sm text-neutral-500 italic font-light hidden"></div>
        </section>

        <!-- Image Upload -->
        <div id="drop-zone" class="border border-dashed border-neutral-200 py-20 text-center mb-16 cursor-pointer hover:border-neutral-400 transition">
            <p class="text-xs uppercase tracking-widest text-neutral-400">Drag to Archive +</p>
            <input type="file" id="file-input" class="hidden" accept="image/*">
        </div>

        <!-- Catalog -->
        <div id="catalog-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-12">
            <!-- Items appear here -->
        </div>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
