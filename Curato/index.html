<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curato | Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #fff; color: #1a1a1a; overflow-x: hidden; }
        .item-card { position: relative; }
        .item-card img { filter: grayscale(100%); transition: all 0.4s ease; display: block; width: 100%; height: 100%; object-fit: cover; }
        .item-card:hover img { filter: grayscale(0%); }
        .delete-btn { 
            position: absolute; top: 10px; right: 10px; z-index: 50;
            background-color: white; color: #ff4444; padding: 4px 10px; 
            font-size: 10px; font-weight: bold; text-transform: uppercase; 
            border: 1px solid #eee; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .delete-btn:hover { background-color: #ff4444; color: white; border-color: #ff4444; }
        .cat-opt.active { background: #000; color: #fff; border-color: #000; }
    </style>
</head>
<body class="p-6 md:p-12">
    <header class="max-w-6xl mx-auto flex justify-between items-end mb-16">
        <div>
            <h1 class="text-3xl font-extralight tracking-tighter uppercase">Curato</h1>
            <p class="text-[10px] tracking-[0.3em] text-neutral-400 mt-2">PERSONAL CURATION ENGINE</p>
        </div>
        <div class="flex flex-col items-end gap-2">
            <input type="password" id="user-api-key" placeholder="PASTE GEMINI API KEY" class="text-[9px] border border-neutral-200 px-3 py-1 rounded-full w-40 focus:outline-none focus:border-black transition uppercase tracking-widest">
            <button id="auth-btn" class="text-[10px] border border-neutral-200 px-5 py-2 rounded-full hover:bg-black hover:text-white transition tracking-widest uppercase">Connect Discord</button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto">
        <!-- AI Consulting -->
        <section class="mb-20">
            <div class="flex gap-4 items-center mb-6">
                <input type="text" id="occasion-input" placeholder="What's the occasion?" 
                       class="flex-grow bg-transparent border-b border-neutral-200 py-3 text-lg focus:outline-none focus:border-black transition">
                <button id="ask-btn" class="text-[10px] font-bold tracking-widest uppercase py-4 px-8 border border-black hover:bg-black hover:text-white transition">Consult</button>
            </div>
            <div id="ai-suggestion" class="hidden text-sm text-neutral-500 italic font-light p-4 bg-neutral-50 border-l border-black"></div>
        </section>

        <!-- Entry Section -->
        <section class="grid grid-cols-1 lg:grid-cols-2 gap-12 mb-20 border-t border-neutral-100 pt-12">
            <div id="drop-zone" class="border border-dashed border-neutral-200 aspect-square flex flex-col items-center justify-center cursor-pointer hover:border-black transition relative overflow-hidden bg-neutral-50">
                <p id="drop-text" class="text-[10px] uppercase tracking-widest text-neutral-400 text-center px-4">Drag Image or Click</p>
                <img id="preview-img" class="absolute inset-0 w-full h-full object-cover hidden">
                <input type="file" id="file-input" class="hidden" accept="image/*">
            </div>

            <div class="flex flex-col gap-6">
                <div>
                    <label class="text-[10px] uppercase tracking-widest text-neutral-400">Category</label>
                    <div class="flex flex-wrap gap-2 mt-2" id="category-wrap">
                        <button class="cat-opt border px-3 py-1 text-[10px] uppercase tracking-wider rounded-full border-neutral-200" data-val="Watch">Watches</button>
                        <button class="cat-opt border px-3 py-1 text-[10px] uppercase tracking-wider rounded-full border-neutral-200" data-val="Fragrance">Fragrances</button>
                        <button class="cat-opt border px-3 py-1 text-[10px] uppercase tracking-wider rounded-full border-neutral-200" data-val="Apparel">Apparel</button>
                        <button class="cat-opt border px-3 py-1 text-[10px] uppercase tracking-wider rounded-full border-neutral-200" data-val="Other">Other</button>
                    </div>
                </div>
                <input type="text" id="item-name" placeholder="Item Name" class="border-b border-neutral-100 py-2 focus:outline-none focus:border-black text-sm">
                <input type="text" id="item-brand" placeholder="Brand" class="border-b border-neutral-100 py-2 focus:outline-none focus:border-black text-sm">
                <button id="save-btn" class="bg-black text-white text-[10px] tracking-widest uppercase py-4 mt-4 disabled:bg-neutral-200 transition">Save to Archive</button>
            </div>
        </section>

        <!-- Catalog Grid -->
        <div id="catalog-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-8"></div>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
